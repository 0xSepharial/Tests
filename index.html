<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Trading Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <div id="terminal">

    <header id="header">
      <div id="header-left">
        <span id="pair">BTC / USDT</span>
        <span id="live-price">—</span>
        <span id="price-change" class="neutral">—</span>
      </div>
      <div id="header-mid">
        <span class="stat"><span class="stat-label">24H VOL</span><span id="stat-vol">—</span></span>
        <span class="stat"><span class="stat-label">HIGH</span><span id="stat-high">—</span></span>
        <span class="stat"><span class="stat-label">LOW</span><span id="stat-low">—</span></span>
        <span class="stat"><span class="stat-label">SPREAD</span><span id="stat-spread">—</span></span>
      </div>
      <div id="header-right">
        <button id="theme-toggle" class="icon-btn" title="Toggle light / dark">◐</button>
      </div>
    </header>

    <div id="chart-area">

      <!-- ── Sidebar toolbar ── -->
      <aside id="sidebar">

        <!-- Cursor -->
        <div class="sb-group">
          <button class="sb-btn active" data-tool="pointer" title="Pointer (V)">
            <svg viewBox="0 0 16 16"><path d="M4 2 L4 13 L7 10 L9 14 L11 13 L9 9 L12 9 Z" fill="currentColor"/></svg>
          </button>
          <button class="sb-btn" data-tool="crosshair" title="Crosshair (C)">
            <svg viewBox="0 0 16 16"><line x1="8" y1="1" x2="8" y2="6"/><line x1="8" y1="10" x2="8" y2="15"/><line x1="1" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="15" y2="8"/><circle cx="8" cy="8" r="2" fill="none"/></svg>
          </button>
        </div>

        <div class="sb-sep"></div>

        <!-- Lines -->
        <div class="sb-group">
          <button class="sb-btn" data-tool="trendline" title="Trend Line (T)">
            <svg viewBox="0 0 16 16"><line x1="2" y1="13" x2="14" y2="3"/><circle cx="2" cy="13" r="1.5" fill="currentColor"/><circle cx="14" cy="3" r="1.5" fill="currentColor"/></svg>
          </button>
          <button class="sb-btn" data-tool="ray" title="Ray">
            <svg viewBox="0 0 16 16"><line x1="2" y1="13" x2="14" y2="3"/><circle cx="2" cy="13" r="1.5" fill="currentColor"/><line x1="12" y1="2" x2="15" y2="2" stroke-width="1.5"/><line x1="14" y1="1" x2="15" y2="2"/><line x1="14" y1="3" x2="15" y2="2"/></svg>
          </button>
          <button class="sb-btn" data-tool="hline" title="Horizontal Line (H)">
            <svg viewBox="0 0 16 16"><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="6" x2="1" y2="10"/><line x1="15" y1="6" x2="15" y2="10"/></svg>
          </button>
          <button class="sb-btn" data-tool="vline" title="Vertical Line">
            <svg viewBox="0 0 16 16"><line x1="8" y1="1" x2="8" y2="15"/><line x1="6" y1="1" x2="10" y2="1"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
          </button>
        </div>

        <div class="sb-sep"></div>

        <!-- Fibonacci -->
        <div class="sb-group">
          <button class="sb-btn" data-tool="fib" title="Fibonacci Retracement (F)">
            <svg viewBox="0 0 16 16"><line x1="2" y1="13" x2="14" y2="3"/><line x1="3" y1="11" x2="13" y2="11"/><line x1="3" y1="8.5" x2="13" y2="8.5"/><line x1="3" y1="7" x2="13" y2="7"/><line x1="3" y1="5" x2="13" y2="5"/></svg>
          </button>
          <button class="sb-btn" data-tool="fib-ext" title="Fibonacci Extension">
            <svg viewBox="0 0 16 16"><line x1="2" y1="10" x2="8" y2="3"/><line x1="8" y1="3" x2="14" y2="10"/><line x1="3" y1="6" x2="13" y2="6"/><line x1="3" y1="10" x2="13" y2="10"/><line x1="3" y1="13" x2="13" y2="13"/></svg>
          </button>
          <button class="sb-btn" data-tool="fib-fan" title="Fibonacci Fan">
            <svg viewBox="0 0 16 16"><circle cx="3" cy="13" r="1.5" fill="currentColor"/><line x1="3" y1="13" x2="14" y2="4"/><line x1="3" y1="13" x2="14" y2="7"/><line x1="3" y1="13" x2="14" y2="10"/></svg>
          </button>
          <button class="sb-btn" data-tool="fib-tz" title="Fibonacci Time Zones">
            <svg viewBox="0 0 16 16"><line x1="3" y1="2" x2="3" y2="14"/><line x1="6" y1="2" x2="6" y2="14"/><line x1="10" y1="2" x2="10" y2="14"/><line x1="16" y1="2" x2="16" y2="14" stroke-dasharray="2,2"/></svg>
          </button>
        </div>

        <div class="sb-sep"></div>

        <!-- Shapes -->
        <div class="sb-group">
          <button class="sb-btn" data-tool="rect" title="Rectangle (R)">
            <svg viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="9" fill="none"/></svg>
          </button>
          <button class="sb-btn" data-tool="circle" title="Ellipse">
            <svg viewBox="0 0 16 16"><ellipse cx="8" cy="8" rx="6" ry="5" fill="none"/></svg>
          </button>
          <button class="sb-btn" data-tool="channel" title="Parallel Channel">
            <svg viewBox="0 0 16 16"><line x1="2" y1="11" x2="14" y2="5"/><line x1="2" y1="13" x2="14" y2="7" stroke-dasharray="3,2"/></svg>
          </button>
          <button class="sb-btn" data-tool="pitchfork" title="Andrews Pitchfork">
            <svg viewBox="0 0 16 16"><line x1="8" y1="2" x2="8" y2="14"/><line x1="3" y1="6" x2="8" y2="3"/><line x1="13" y1="6" x2="8" y2="3"/><line x1="3" y1="6" x2="3" y2="14"/><line x1="13" y1="6" x2="13" y2="14"/></svg>
          </button>
        </div>

        <div class="sb-sep"></div>

        <!-- Trade tools -->
        <div class="sb-group">
          <button class="sb-btn" data-tool="long" title="Long Position">
            <svg viewBox="0 0 16 16"><rect x="2" y="8" width="12" height="6" fill="none" stroke="#4a9463"/><line x1="8" y1="8" x2="8" y2="2" stroke="#4a9463"/><polyline points="5,5 8,2 11,5" fill="none" stroke="#4a9463"/></svg>
          </button>
          <button class="sb-btn" data-tool="short" title="Short Position">
            <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="6" fill="none" stroke="#c0392b"/><line x1="8" y1="8" x2="8" y2="14" stroke="#c0392b"/><polyline points="5,11 8,14 11,11" fill="none" stroke="#c0392b"/></svg>
          </button>
          <button class="sb-btn" data-tool="measure" title="Measure (M)">
            <svg viewBox="0 0 16 16"><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="5" x2="2" y2="11"/><line x1="14" y1="5" x2="14" y2="11"/><line x1="8" y1="6" x2="8" y2="10"/></svg>
          </button>
        </div>

        <div class="sb-sep"></div>

        <!-- Utilities -->
        <div class="sb-group">
          <button class="sb-btn" data-tool="text" title="Text Annotation">
            <svg viewBox="0 0 16 16"><text x="4" y="13" font-size="11" font-weight="500" fill="currentColor" stroke="none">T</text></svg>
          </button>
          <button class="sb-btn" id="magnet-btn" title="Magnet Mode (snap to OHLC)">
            <svg viewBox="0 0 16 16"><path d="M4 2 A4 4 0 0 1 12 2 L12 7 L10 7 L10 2 A2 2 0 0 0 6 2 L6 7 L4 7 Z" fill="currentColor"/><line x1="4" y1="9" x2="4" y2="11"/><line x1="12" y1="9" x2="12" y2="11"/></svg>
          </button>
          <button class="sb-btn" data-tool="eraser" title="Erase Drawing">
            <svg viewBox="0 0 16 16"><path d="M3 12 L10 5 L13 8 L6 15 Z" fill="none"/><line x1="2" y1="15" x2="8" y2="15"/><line x1="10" y1="5" x2="13" y2="8"/></svg>
          </button>
          <button class="sb-btn" id="clear-btn" title="Clear All Drawings">
            <svg viewBox="0 0 16 16"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
          </button>
        </div>

      </aside><!-- /sidebar -->

      <div id="main-column">
        <canvas id="canvas-main"></canvas>
        <canvas id="canvas-overlay"></canvas>
      </div>
      <div id="ob-column">
        <div id="ob-tabs">
          <button class="ob-tab active" data-tab="depth">DEPTH</button>
          <button class="ob-tab" data-tab="feed">FEED</button>
        </div>
        <canvas id="canvas-orderbook"></canvas>
        <div id="feed-panel"></div>
      </div>

    </div><!-- /chart-area -->

    <canvas id="canvas-indicators"></canvas>

    <nav id="nav-bar">
      <div id="timeframe-btns">
        <button class="tf-btn active" data-tf="1m">1M</button>
        <button class="tf-btn" data-tf="5m">5M</button>
        <button class="tf-btn" data-tf="1h">1H</button>
        <button id="multi-btn" class="tf-btn" data-tf="multi" title="Multi-timeframe overlay">MULTI</button>
        <button id="footprint-btn" class="tf-btn" title="Footprint Chart">FOOTPRINT</button>
      </div>

      <div id="palette-picker">
        <span class="pal-label">PALETTE</span>
        <button class="pal-btn active" data-pal="classic" title="Classic">
          <span class="sw" style="background:#4a9463"></span><span class="sw" style="background:#c0392b"></span>
        </button>
        <button class="pal-btn" data-pal="slate" title="Slate">
          <span class="sw" style="background:#5b7fa6"></span><span class="sw" style="background:#a0522d"></span>
        </button>
        <button class="pal-btn" data-pal="mono" title="Monochrome">
          <span class="sw" style="background:#c8c4bc"></span><span class="sw" style="background:#484644"></span>
        </button>
        <button class="pal-btn" data-pal="coral" title="Coral">
          <span class="sw" style="background:#e08060"></span><span class="sw" style="background:#6080e0"></span>
        </button>
        <button class="pal-btn" data-pal="sage" title="Sage">
          <span class="sw" style="background:#7aab8a"></span><span class="sw" style="background:#ab7a7a"></span>
        </button>
      </div>

      <div id="indicator-toggles">
        <span class="pal-label">OVERLAY</span>
        <button class="ind-btn active" data-ind="bb" title="Bollinger Bands">BB</button>
        <button class="ind-btn active" data-ind="macd" title="MACD">MACD</button>
        <button class="ind-btn active" data-ind="rsi" title="RSI">RSI</button>
        <button class="ind-btn active" data-ind="heatmap" title="Volume Profile">VOL PROFILE</button>
      </div>
    </nav>

  </div>

  <!-- Tweet popup container -->
  <div id="popup-container"></div>

  <!-- Floating text input for text annotation tool -->
  <input id="text-input" type="text" placeholder="annotation…" autocomplete="off" spellcheck="false">

  <script type="module" src="js/main.js"></script>
</body>
</html>
